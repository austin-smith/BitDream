name: Build Verification

on:
  pull_request:
    branches:
      - main
  merge_group:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  macos-build:
    name: macOS Build
    runs-on: macos-26

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build app (macOS)
        run: |
          xcodebuild build \
            -project BitDream.xcodeproj \
            -scheme BitDream \
            -configuration Debug \
            -destination "generic/platform=macOS" \
            -derivedDataPath "$RUNNER_TEMP/DerivedData" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO

  ios-build:
    name: iOS Build
    runs-on: macos-26

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build app (iOS)
        run: |
          xcodebuild build \
            -project BitDream.xcodeproj \
            -scheme BitDream \
            -configuration Debug \
            -destination "generic/platform=iOS" \
            -derivedDataPath "$RUNNER_TEMP/DerivedData" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO
